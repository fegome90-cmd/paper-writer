name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PAPER_SEARCH_PROVIDER: fixture

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff — root
        run: uv run ruff check .

      - name: Ruff — scripts
        run: uv run ruff check scripts/ --config pyproject.toml

      - name: Ruff — thesaurus
        run: uv run ruff check --config pyproject.toml skills/local/thesaurus/src/ skills/local/thesaurus/tests/

      - name: Ruff — MeSH import
        run: uv run ruff check --config pyproject.toml skills/local/mesh-import/src/ skills/local/mesh-import/tests/

      - name: Mypy
        run: >
          uv run mypy
          harness/ cli/ validators/ integrations/ verification/
          parsers/ engine/ rules/ schemas/ skills/

  tests-core:
    name: Core tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: py-${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify interpreter
        run: uv run python --version

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run core tests
        run: |
          mkdir -p test-results
          uv run pytest tests/ \
            -m "not e2e" \
            --tb=short \
            --junitxml=test-results/core-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-test-results-${{ matrix.python-version }}
          path: test-results/
          retention-days: 7

  local-skills:
    name: Local skills — thesaurus + MeSH import
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install root and local packages
        run: |
          uv sync --dev --frozen
          uv pip install -e skills/local/thesaurus
          uv pip install -e skills/local/mesh-import

      - name: Run thesaurus tests
        run: uv run pytest skills/local/thesaurus/tests/ --tb=short

      - name: Run MeSH import tests
        run: uv run pytest skills/local/mesh-import/tests/ --tb=short

  offline-e2e:
    name: Offline E2E
    runs-on: ubuntu-latest
    needs: [quality, tests-core, local-skills]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -m e2e --tb=short

  build-smoke:
    name: Build and install smoke test
    runs-on: ubuntu-latest
    needs: [quality, tests-core, local-skills, offline-e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Install wheel in clean environment
        run: |
          uv venv /tmp/paper-writer-smoke --python 3.12
          uv pip install \
            --python /tmp/paper-writer-smoke/bin/python \
            dist/*.whl
          /tmp/paper-writer-smoke/bin/paper --help

      - name: Verify wheel contains runtime assets
        run: |
          python - <<'PY'
          import zipfile, sys
          whl = [f for f in __import__("os").listdir("dist") if f.endswith(".whl")][0]
          with zipfile.ZipFile(f"dist/{whl}") as z:
            names = z.namelist()
          for required in ["rules/", "schemas/", "templates/", "styles/"]:
            found = [n for n in names if n.startswith(required)]
            assert found, f"Wheel missing {required} — found {len(found)} entries"
            print(f"  ✓ {required} ({len(found)} entries)")
          print("Wheel asset verification passed")
          PY

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper-writer-dist
          path: dist/
          retention-days: 14
