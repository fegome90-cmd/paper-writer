name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy harness/ cli/ validators/ integrations/ tests/ skills/

      - name: Unit + integration tests
        run: uv run pytest tests/ -m "not e2e" --tb=short

      - name: Install Pandoc (for E2E)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc=3.1.3+ds-2build2 || sudo apt-get install -y pandoc

      - name: E2E smoke tests
        run: uv run pytest tests/e2e/ -m e2e --tb=short
