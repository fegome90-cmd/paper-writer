name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PAPER_SEARCH_PROVIDER: fixture

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: >
          uv run mypy
          harness/ cli/ validators/ integrations/ verification/
          parsers/ engine/ rules/ schemas/ skills/

  tests-core:
    name: Core tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-suffix: py-${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run core tests
        run: |
          mkdir -p test-results
          uv run pytest tests/ \
            -m "not e2e" \
            --tb=short \
            --junitxml=test-results/core-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: core-test-results-${{ matrix.python-version }}
          path: test-results/
          retention-days: 7

  local-skills:
    name: Local skills — thesaurus + MeSH import
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install root and local packages
        run: |
          uv sync --dev --frozen
          uv pip install -e skills/local/thesaurus
          uv pip install -e skills/local/mesh-import

      - name: Run thesaurus tests
        run: uv run pytest skills/local/thesaurus/tests/ --tb=short

      - name: Run MeSH import tests
        run: uv run pytest skills/local/mesh-import/tests/ --tb=short

  offline-e2e:
    name: Offline E2E
    runs-on: ubuntu-latest
    needs: [quality, tests-core, local-skills]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -m e2e --tb=short

  build-smoke:
    name: Build and install smoke test
    runs-on: ubuntu-latest
    needs: [quality, tests-core, local-skills, offline-e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Install wheel in clean environment
        run: |
          uv venv /tmp/paper-writer-smoke --python 3.12
          uv pip install \
            --python /tmp/paper-writer-smoke/bin/python \
            dist/*.whl
          /tmp/paper-writer-smoke/bin/paper --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: paper-writer-dist
          path: dist/
          retention-days: 14
