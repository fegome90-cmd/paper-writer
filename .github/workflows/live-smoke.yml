name: Live integrations smoke test

on:
  workflow_dispatch:
    inputs:
      run_zotero:
        description: "Run Zotero connectivity smoke tests"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: zotero-live
  cancel-in-progress: false

jobs:
  zotero-live:
    name: Zotero live smoke
    if: inputs.run_zotero
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: live-integrations

    env:
      RUN_LIVE_ZOTERO_TESTS: "1"
      PAPER_SEARCH_PROVIDER: fixture
      ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      ZOTERO_LIBRARY_TYPE: user

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run E2E pipeline with Zotero
        run: uv run python scripts/test_pipeline_e2e.py

      - name: Run Zotero integration tests
        run: uv run pytest tests/integrations/ -k zotero --tb=short

      - name: Run CLI CRUD smoke
        run: uv run python scripts/test_cli_full.py
