name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag targets main branch
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Validate tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Install dependencies
        run: |
          uv sync --dev --frozen
          uv pip install -e skills/local/thesaurus
          uv pip install -e skills/local/mesh-import

      - name: Run core tests
        env:
          PAPER_SEARCH_PROVIDER: fixture
        run: uv run pytest tests/ -m "not e2e" --tb=short

      - name: Run thesaurus tests
        run: uv run pytest skills/local/thesaurus/tests/ --tb=short

      - name: Run MeSH import tests
        run: uv run pytest skills/local/mesh-import/tests/ --tb=short

      - name: Build wheel and source distribution
        run: uv build

      - name: Smoke install wheel
        run: |
          uv venv /tmp/paper-writer-release --python 3.12
          uv pip install \
            --python /tmp/paper-writer-release/bin/python \
            dist/*.whl
          /tmp/paper-writer-release/bin/paper --help

      - name: Verify wheel contains runtime assets
        run: |
          python - <<'PY'
          import zipfile
          import os
          whl = [f for f in os.listdir("dist") if f.endswith(".whl")][0]
          with zipfile.ZipFile(f"dist/{whl}") as z:
              names = z.namelist()
          for required in ["rules/", "schemas/", "templates/", "styles/"]:
              found = [n for n in names if n.startswith(required)]
              assert found, f"Wheel missing {required} — found {len(found)} entries"
              print(f"  ✓ {required} ({len(found)} entries)")
          print("Wheel asset verification passed")
          PY

      - name: Audit dependencies
        run: |
          uv export --frozen --no-dev --output-file requirements-release.txt
          uvx pip-audit@0.9.0 -r requirements-release.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper-writer-${{ github.ref_name }}
          path: dist/
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* \
            --verify-tag \
            --generate-notes
